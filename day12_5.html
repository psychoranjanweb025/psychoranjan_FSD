<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div  class="container-fluid">
        <h1>bootstrap button classes example</h1>
                <input class="btn btn-primary" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-success" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-warning" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-info" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-danger" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-link" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-secondary" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-dark" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-light" type="button" value="simple Button"/> <br><br>

                <h1>bootstrap  button outline classes example</h1>
                <input class="btn btn-outline-primary" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-outline-success" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-outline-warning" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-outline-info" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-outline-danger" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-outline-link" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-outline-secondary" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-outline-dark" type="button" value="simple Button"/> <br><br>
                <input class="btn btn-outline-light" type="button" value="simple Button"/> <br><br>
    </div>
</body>
</html>
